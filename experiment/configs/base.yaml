# EXACT copy of openevolve/examples/function_minimization/config.yaml
# ONLY changes: api_base → OpenRouter, added api_key, max_iterations bumped to 100
# Model names are identical — OpenRouter hosts these same models

harness: openevolve
provider: openrouter

max_iterations: 100
checkpoint_interval: 25

# LLM configuration — shipped models, shipped weights
llm:
  primary_model: "google/gemini-2.5-flash-lite"
  primary_model_weight: 0.8
  secondary_model: "google/gemini-2.5-flash"
  secondary_model_weight: 0.2
  api_base: "https://openrouter.ai/api/v1"
  api_key: "${OPENROUTER_API_KEY}"
  temperature: 0.7
  max_tokens: 16000
  timeout: 120

# Prompt configuration — UNCHANGED from shipped
prompt:
  system_message: "You are an expert programmer specializing in optimization algorithms. Your task is to improve a function minimization algorithm to find the global minimum of a complex function with many local minima. The function is f(x, y) = sin(x) * cos(y) + sin(x*y) + (x^2 + y^2)/20. Focus on improving the search_algorithm function to reliably find the global minimum, escaping local minima that might trap simple algorithms."

# Database configuration — UNCHANGED from shipped
database:
  population_size: 50
  archive_size: 20
  num_islands: 3
  elite_selection_ratio: 0.2
  exploitation_ratio: 0.7
  similarity_threshold: 0.99

# Evaluator configuration — UNCHANGED from shipped
evaluator:
  timeout: 60
  cascade_thresholds: [1.3]
  parallel_evaluations: 3

# Evolution settings — UNCHANGED from shipped
diff_based_evolution: true
max_code_length: 20000
