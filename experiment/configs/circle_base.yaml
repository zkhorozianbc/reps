# EXACT copy of examples/circle_packing/config_phase_1.yaml
# ONLY change: added api_key for OpenRouter (api_base already points there)
harness: openevolve
provider: openrouter
task: ../benchmarks/circle_packing

max_iterations: 100
checkpoint_interval: 10
log_level: "INFO"

llm:
  primary_model: "google/gemini-2.0-flash-001"
  primary_model_weight: 0.8
  secondary_model: "anthropic/claude-3.7-sonnet"
  secondary_model_weight: 0.2
  api_base: "https://openrouter.ai/api/v1"
  api_key: "${OPENROUTER_API_KEY}"
  temperature: 0.7
  top_p: 0.95
  max_tokens: 8192
  timeout: 600

prompt:
  num_top_programs: 3
  use_template_stochasticity: true

database:
  population_size: 60
  archive_size: 25
  num_islands: 4
  elite_selection_ratio: 0.3
  exploitation_ratio: 0.7

evaluator:
  timeout: 60
  cascade_evaluation: true
  cascade_thresholds: [0.5, 0.75]
  parallel_evaluations: 4
  use_llm_feedback: false

diff_based_evolution: false
allow_full_rewrites: true
