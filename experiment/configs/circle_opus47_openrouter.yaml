# Circle packing n=26 — Opus 4.7 via OpenRouter
# Same REPS setup as circle_opus47_anthropic.yaml, routed through OpenRouter so
# reasoning output is surfaced in the response.
harness: reps
provider: openrouter
reasoning: medium
task: ../benchmarks/circle_packing
max_iterations: 50
log_level: INFO
random_seed: 42

llm:
  primary_model: "anthropic/claude-opus-4.7"
  primary_model_weight: 1.0
  api_base: "https://openrouter.ai/api/v1"
  api_key: "${OPENROUTER_API_KEY}"
  temperature: 0.7
  # Opus 4.7 with reasoning=medium can spend 25k+ tokens thinking before the
  # final answer. Anything under ~60k causes finish_reason=length with no
  # content returned. Leave generous headroom.
  max_tokens: 64000
  timeout: 600

prompt:
  num_top_programs: 3
  use_template_stochasticity: true

database:
  population_size: 60
  archive_size: 25
  num_islands: 4
  elite_selection_ratio: 0.3
  exploitation_ratio: 0.7

evaluator:
  timeout: 300
  cascade_evaluation: false
  parallel_evaluations: 2

diff_based_evolution: false

reps:
  enabled: true
  batch_size: 5

  reflection:
    enabled: true
    top_k: 3
    bottom_k: 2

  revisitation:
    enabled: true
    epsilon_start: 0.15
    epsilon_end: 0.05
    decay: "linear"
    recency_window: 20

  workers:
    types:
      - name: sc_exploiter
        impl: single_call
        role: exploiter
        model_id: anthropic/claude-opus-4.7
        temperature: 0.3
        generation_mode: full
        max_turns: 1
        uses_evaluator: false
        owns_temperature: true
        weight: 0.6
      - name: sc_explorer
        impl: single_call
        role: explorer
        model_id: anthropic/claude-opus-4.7
        temperature: 1.0
        generation_mode: full
        max_turns: 1
        uses_evaluator: false
        owns_temperature: true
        weight: 0.25
      - name: sc_crossover
        impl: single_call
        role: crossover
        model_id: anthropic/claude-opus-4.7
        generation_mode: full
        max_turns: 1
        uses_evaluator: false
        weight: 0.15

  convergence:
    enabled: true
    window_size: 10
    entropy_threshold_mild: 0.5
    entropy_threshold_moderate: 0.3
    entropy_threshold_severe: 0.15

  contracts:
    enabled: false

  sota:
    enabled: true
    target_score: 2.6361

  annotations:
    enabled: true
    dead_end_awareness: true
