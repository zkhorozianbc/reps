# Circle packing with Opus 4.6 — REPS enabled
# Starting from Sonnet's SOTA-beating program as initial seed
harness: reps
provider: openrouter
task: ../benchmarks/circle_packing

max_iterations: 100
checkpoint_interval: 10
log_level: "INFO"

llm:
  primary_model: "anthropic/claude-opus-4.6"
  primary_model_weight: 1.0
  secondary_model: "anthropic/claude-opus-4.6"
  secondary_model_weight: 0.0
  api_base: "https://openrouter.ai/api/v1"
  api_key: "${OPENROUTER_API_KEY}"
  temperature: 0.7
  top_p: 0.95
  max_tokens: 32000
  timeout: 600

prompt:
  num_top_programs: 3
  use_template_stochasticity: true

database:
  population_size: 60
  archive_size: 25
  num_islands: 4
  elite_selection_ratio: 0.3
  exploitation_ratio: 0.7

evaluator:
  timeout: 90
  cascade_evaluation: true
  cascade_thresholds: [0.5, 0.75]
  parallel_evaluations: 4
  use_llm_feedback: false

diff_based_evolution: false

reps:
  enabled: true
  batch_size: 5

  reflection:
    enabled: true
    top_k: 3
    bottom_k: 2

  revisitation:
    enabled: true
    epsilon_start: 0.15
    epsilon_end: 0.05
    decay: "linear"
    recency_window: 20

  workers:
    types:
      - name: sc_exploiter
        impl: single_call
        role: exploiter
        model_id: anthropic/claude-opus-4.6
        temperature: 0.3
        generation_mode: full
        max_turns: 1
        uses_evaluator: false
        owns_temperature: true
        weight: 0.7
      - name: sc_explorer
        impl: single_call
        role: explorer
        model_id: anthropic/claude-opus-4.6
        temperature: 1.0
        generation_mode: full
        max_turns: 1
        uses_evaluator: false
        owns_temperature: true
        weight: 0.15
      - name: sc_crossover
        impl: single_call
        role: crossover
        model_id: anthropic/claude-opus-4.6
        generation_mode: full
        max_turns: 1
        uses_evaluator: false
        weight: 0.15

  convergence:
    enabled: true
    window_size: 10
    entropy_threshold_mild: 0.5
    entropy_threshold_moderate: 0.3
    entropy_threshold_severe: 0.15

  contracts:
    enabled: true
    models: ["anthropic/claude-opus-4.6"]
    temperatures: [0.3, 0.7, 1.0]

  sota:
    enabled: true
    target_score: 2.6361
    target_metric: sum_radii

  annotations:
    enabled: true
    dead_end_awareness: true
