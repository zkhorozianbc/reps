# circle_base.yaml + REPS features
# Everything above reps: is IDENTICAL to circle_base.yaml
harness: reps
provider: openrouter
task: ../benchmarks/circle_packing

max_iterations: 100
checkpoint_interval: 10
log_level: "INFO"

llm:
  primary_model: "google/gemini-2.0-flash-001"
  primary_model_weight: 0.8
  secondary_model: "anthropic/claude-3.7-sonnet"
  secondary_model_weight: 0.2
  api_base: "https://openrouter.ai/api/v1"
  api_key: "${OPENROUTER_API_KEY}"
  temperature: 0.7
  top_p: 0.95
  max_tokens: 8192
  timeout: 600

prompt:
  num_top_programs: 3
  use_template_stochasticity: true

database:
  population_size: 60
  archive_size: 25
  num_islands: 4
  elite_selection_ratio: 0.3
  exploitation_ratio: 0.7

evaluator:
  timeout: 60
  cascade_evaluation: true
  cascade_thresholds: [0.5, 0.75]
  parallel_evaluations: 4
  use_llm_feedback: false

diff_based_evolution: false
allow_full_rewrites: true

# --- REPS ---
reps:
  enabled: true
  batch_size: 5

  reflection:
    enabled: true
    top_k: 3
    bottom_k: 2

  revisitation:
    enabled: true
    epsilon_start: 0.15
    epsilon_end: 0.05
    decay: "linear"
    recency_window: 20

  workers:
    types: ["exploiter", "explorer", "crossover"]
    initial_allocation:
      exploiter: 0.6
      explorer: 0.25
      crossover: 0.15
    exploiter_temperature: 0.3
    explorer_temperature: 1.0

  convergence:
    enabled: true
    window_size: 10
    entropy_threshold_mild: 0.5
    entropy_threshold_moderate: 0.3
    entropy_threshold_severe: 0.15

  contracts:
    enabled: true
    models: ["google/gemini-2.0-flash-001", "anthropic/claude-3.7-sonnet"]
    temperatures: [0.3, 0.7, 1.0]

  sota:
    enabled: true
    target_score: 2.635

  annotations:
    enabled: true
    dead_end_awareness: true
