# Circle packing with Sonnet 4.6 — REPS enabled
# Identical to circle_sonnet_base.yaml above reps: section
harness: reps
provider: openrouter

max_iterations: 100
checkpoint_interval: 10
log_level: "INFO"

llm:
  primary_model: "anthropic/claude-sonnet-4.6"
  primary_model_weight: 1.0
  secondary_model: "anthropic/claude-sonnet-4.6"
  secondary_model_weight: 0.0
  api_base: "https://openrouter.ai/api/v1"
  api_key: "${OPENROUTER_API_KEY}"
  temperature: 0.7
  top_p: 0.95
  max_tokens: 8192
  timeout: 600

prompt:
  system_message: |
    You are an expert mathematician specializing in circle packing problems and computational geometry. Your task is to improve a constructor function that directly produces a specific arrangement of 26 circles in a unit square, maximizing the sum of their radii. The AlphaEvolve paper achieved a sum of 2.635983 for n=26 (paper rounds to 2.635).

    Key geometric insights:
    - Circle packings often follow hexagonal patterns in the densest regions
    - Maximum density for infinite circle packing is pi/(2*sqrt(3)) ≈ 0.9069
    - Edge effects make square container packing harder than infinite packing
    - Circles can be placed in layers or shells when confined to a square
    - Similar radius circles often form regular patterns, while varied radii allow better space utilization
    - Perfect symmetry may not yield the optimal packing due to edge effects

    Focus on designing an explicit constructor that places each circle in a specific position, rather than an iterative search algorithm.
  num_top_programs: 3
  use_template_stochasticity: true

database:
  population_size: 60
  archive_size: 25
  num_islands: 4
  elite_selection_ratio: 0.3
  exploitation_ratio: 0.7

evaluator:
  timeout: 60
  cascade_evaluation: true
  cascade_thresholds: [0.5, 0.75]
  parallel_evaluations: 4
  use_llm_feedback: false

diff_based_evolution: false
allow_full_rewrites: true

# --- REPS ---
reps:
  enabled: true
  batch_size: 5

  reflection:
    enabled: true
    top_k: 3
    bottom_k: 2

  revisitation:
    enabled: true
    epsilon_start: 0.15
    epsilon_end: 0.05
    decay: "linear"
    recency_window: 20

  workers:
    types: ["exploiter", "explorer", "crossover"]
    initial_allocation:
      exploiter: 0.6
      explorer: 0.25
      crossover: 0.15
    exploiter_temperature: 0.3
    explorer_temperature: 1.0

  convergence:
    enabled: true
    window_size: 10
    entropy_threshold_mild: 0.5
    entropy_threshold_moderate: 0.3
    entropy_threshold_severe: 0.15

  contracts:
    enabled: true
    models: ["anthropic/claude-sonnet-4.6"]
    temperatures: [0.3, 0.7, 1.0]

  sota:
    enabled: true
    target_score: 2.635983

  annotations:
    enabled: true
    dead_end_awareness: true
