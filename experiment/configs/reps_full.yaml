# base.yaml + all REPS features enabled
# Everything above the reps: section is BYTE-IDENTICAL to base.yaml
harness: reps
provider: openrouter

max_iterations: 100
checkpoint_interval: 25

llm:
  primary_model: "google/gemini-2.5-flash-lite"
  primary_model_weight: 0.8
  secondary_model: "google/gemini-2.5-flash"
  secondary_model_weight: 0.2
  api_base: "https://openrouter.ai/api/v1"
  api_key: "${OPENROUTER_API_KEY}"
  temperature: 0.7
  max_tokens: 16000
  timeout: 120

prompt:
  system_message: "You are an expert programmer specializing in optimization algorithms. Your task is to improve a function minimization algorithm to find the global minimum of a complex function with many local minima. The function is f(x, y) = sin(x) * cos(y) + sin(x*y) + (x^2 + y^2)/20. Focus on improving the search_algorithm function to reliably find the global minimum, escaping local minima that might trap simple algorithms."

database:
  population_size: 50
  archive_size: 20
  num_islands: 3
  elite_selection_ratio: 0.2
  exploitation_ratio: 0.7
  similarity_threshold: 0.99

evaluator:
  timeout: 60
  cascade_thresholds: [1.3]
  parallel_evaluations: 3

diff_based_evolution: true
max_code_length: 20000

# --- REPS: the only addition ---
reps:
  enabled: true
  batch_size: 5

  reflection:
    enabled: true
    top_k: 3
    bottom_k: 2

  revisitation:
    enabled: true
    epsilon_start: 0.15
    epsilon_end: 0.05
    decay: "linear"
    recency_window: 20

  workers:
    types:
      - name: sc_exploiter
        impl: single_call
        role: exploiter
        model_id: google/gemini-2.5-flash-lite
        temperature: 0.3
        generation_mode: diff
        max_turns: 1
        uses_evaluator: false
        owns_temperature: true
        weight: 0.6
      - name: sc_explorer
        impl: single_call
        role: explorer
        model_id: google/gemini-2.5-flash-lite
        temperature: 1.0
        generation_mode: diff
        max_turns: 1
        uses_evaluator: false
        owns_temperature: true
        weight: 0.25
      - name: sc_crossover
        impl: single_call
        role: crossover
        model_id: google/gemini-2.5-flash-lite
        generation_mode: diff
        max_turns: 1
        uses_evaluator: false
        weight: 0.15

  convergence:
    enabled: true
    window_size: 10
    entropy_threshold_mild: 0.5
    entropy_threshold_moderate: 0.3
    entropy_threshold_severe: 0.15

  contracts:
    enabled: true
    models: ["google/gemini-2.5-flash-lite", "google/gemini-2.5-flash"]
    temperatures: [0.3, 0.7, 1.0]

  sota:
    enabled: false

  annotations:
    enabled: true
    dead_end_awareness: true
