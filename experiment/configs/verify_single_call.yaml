# experiment/configs/verify_single_call.yaml
# Verification Run A: single-LLM-call worker (baseline for the new primitive).
# Defaults (CLI args override):
initial_program: experiment/benchmarks/circle_packing/initial_program.py
evaluator_path: experiment/benchmarks/circle_packing/evaluator.py
output: experiment/results/verify_single_call

max_iterations: 40
checkpoint_interval: 20
log_level: INFO
random_seed: 42
language: python
file_suffix: .py
provider: anthropic
harness: reps

llm:
  api_key: "${ANTHROPIC_API_KEY}"
  temperature: 0.7
  max_tokens: 8000
  timeout: 300
  retries: 3
  retry_delay: 5
  models:
    - name: claude-sonnet-4-6
      provider: anthropic
      weight: 1.0

prompt:
  template_dir: null
  num_top_programs: 3
  num_diverse_programs: 2

database:
  population_size: 200
  archive_size: 50
  num_islands: 3
  log_prompts: true
  random_seed: 42

evaluator:
  timeout: 300
  max_retries: 2
  parallel_evaluations: 3
  max_concurrent_iterations: 3
  cascade_evaluation: true

diff_based_evolution: true

reps:
  enabled: true
  batch_size: 8
  workers:
    types:
      - name: sc_exploiter
        impl: single_call
        role: exploiter
        model_id: claude-sonnet-4-6
        temperature: 0.3
        generation_mode: diff
        weight: 1.0
  reflection:
    enabled: true
    top_k: 3
    bottom_k: 2
  revisitation:
    enabled: true
  convergence:
    enabled: true
  contracts:
    enabled: false
  sota:
    enabled: false
  annotations:
    enabled: true
